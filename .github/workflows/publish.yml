name: publish

# One workflow ships all three: npm + PyPI + crates.io, on a v* tag.
# Secrets (set on the repo): NPM_TOKEN, PYPI_API_TOKEN, CARGO_REGISTRY_TOKEN.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm:
    name: npm → notary-public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public || echo "npm publish skipped (version may already exist)"

  pypi:
    name: PyPI → notary-public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build + publish sidecar
        working-directory: python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine upload --skip-existing --verbose dist/*

  crates:
    name: crates.io → notary-public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        working-directory: rust
        run: |
          cargo publish --allow-dirty --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" \
            || echo "cargo publish skipped (version may already exist or needs a fix-forward)"
